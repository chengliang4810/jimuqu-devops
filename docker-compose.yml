services:
  app:
    image: ghcr.io/chengliang4810/jimuqu-devops:latest
    container_name: jimuqu-devops
    ports:
      - "18080:18080"
    environment:
      APP_DATA_DIR: "${APP_DATA_DIR:-/data/jimuqu-devops}"
      APP_SECRET: "jimuqu-devops-secret"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
    volumes:
      - ${APP_DATA_DIR:-/data/jimuqu-devops}:${APP_DATA_DIR:-/data/jimuqu-devops}
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
