name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "latest"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build release archives
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/archives/*
