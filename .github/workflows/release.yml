name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Release context
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "latest"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --merged "${GITHUB_SHA}" --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fxv "${current_tag}" | head -n 1 || true)"

          {
            echo "## 更新内容"
            echo ""
            if [[ -n "${previous_tag}" ]]; then
              echo "范围: \`${previous_tag}..${current_tag}\`"
              echo ""
              git log --no-merges --pretty='- %s (`%h`)' "${previous_tag}..${GITHUB_SHA}"
            else
              echo "范围: 初始发布"
              echo ""
              git log --no-merges --pretty='- %s (`%h`)' "${GITHUB_SHA}"
            fi
          } > build-release-notes.md

      - name: Build release archives
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: build-release-notes.md
          files: build/archives/*

      - name: Release summary
        run: |
          {
            echo "## Release"
            echo ""
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Version: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Assets path: \`build/archives/*\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-ghcr:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Image context
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build metadata
        id: buildmeta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: GHCR summary
        run: |
          {
            echo "## GHCR Publish"
            echo ""
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Version: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Images:"
            echo '```text'
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
