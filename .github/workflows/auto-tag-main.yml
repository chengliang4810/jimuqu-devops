name: auto-tag-main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  create-patch-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch origin --force --tags

      - name: Compute next patch tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -n "${latest_tag}" ]]; then
            latest_sha="$(git rev-list -n 1 "${latest_tag}")"
            if [[ "${latest_sha}" == "${GITHUB_SHA}" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" "${GITHUB_SHA}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Workflow summary
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.skip }}" == "true" ]]; then
            echo "Current commit already matches latest release tag: \`${{ steps.version.outputs.tag }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Created and pushed release tag: \`${{ steps.version.outputs.tag }}\`." >> "$GITHUB_STEP_SUMMARY"
          fi
